name: Build blocklist

on:
  push:
    paths:
      - 'custom_blocklist.txt'
      - '.github/workflows/build-blocklist.yml'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch master blocklist
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/MVTS-Corp/WinGetAutoUpdate-Blocklist/main/blocklist.txt \
            -o master.txt

      - name: Build combined blocklist
        run: |
          {
            cat master.txt
            echo ""
            cat custom_blocklist.txt
          } | grep -v '^\s*#' | grep -v '^\s*$' > blocklist.txt

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocklist.txt
          if ! git diff --cached --quiet; then
            git commit -m "Rebuild blocklist $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit."
          fi
