name: BUILD BLOCKLIST

on:
  push:
    paths:
      - 'custom_blocklist.txt'
      - '.github/workflows/build_blocklist.yml'
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC, picks up master changes
  workflow_dispatch:        # manual trigger button in the UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: FETCH MASTER BLOCKLIST
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/MVTS-Corp/WinGetAutoUpdate-Blocklist/main/blocklist.txt \
            -o master.txt

      - name: BUILD COMBINED BLOCKLIST
        run: |
          {
            cat master.txt
            echo ""
            cat custom_blocklist.txt
          } | grep -v '^\s*#' | grep -v '^\s*$' > blocklist.txt

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet blocklist.txt; then
            git add blocklist.txt
            git commit -m "Rebuild blocklist $(date -u +'%Y-%m-%d')"
            git push
          fi
